name: d0wndetect0r

services:
  postgres:
    image: postgres:16-alpine
    container_name: d0wndetect0r-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-d0wndetect0r_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-d0wndetect0r}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U d0wndetect0r_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: proxy
    external: true
